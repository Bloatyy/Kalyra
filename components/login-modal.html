<div class="login-backdrop" id="login-backdrop"></div>

<div class="login-modal" id="login-modal" role="dialog" aria-modal="true">
    <button class="login-close" id="login-close" aria-label="Close modal">&times;</button>

    <div class="login-header">
        <h2 class="login-title">Welcome <em>Back</em></h2>
        <p class="login-sub">Sign in to your account to continue</p>
    </div>

    <!-- PHONE LOGIN STEP -->
    <div id="login-step-phone" class="login-step">
        <div class="login-field">
            <label class="login-label">MOBILE NUMBER</label>
            <div class="phone-input-group">
                <div class="country-select">
                    <img src="https://flagcdn.com/w20/in.png" alt="IN" class="flag-icon">
                    <span>+91</span>
                </div>
                <input type="tel" id="login-phone" class="login-input" placeholder="Enter mobile number" maxlength="10">
            </div>
        </div>

        <!-- Checkboxes removed for cleaner UI -->

        <button type="button" class="login-submit" id="btn-send-otp">Send OTP</button>

        <div class="login-footer">
            <p>By continuing, I confirm that I've read & understood the <a href="privacy.html">Privacy Policy</a> and <a
                    href="terms.html">T&Cs</a></p>
            <button type="button" class="login-secondary-link" id="btn-to-email">Continue with Email</button>
        </div>
    </div>

    <!-- OTP VERIFICATION STEP (Initially Hidden) -->
    <div id="login-step-otp" class="login-step" hidden>
        <div class="login-field">
            <label class="login-label">ENTER OTP</label>
            <div class="otp-input-group">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
            </div>
            <p class="otp-resend">Didn't receive code? <button type="button">Resend</button></p>
        </div>

        <button type="button" class="login-submit" id="btn-verify-otp">Verify & Login</button>

        <button type="button" class="login-back-btn" id="btn-back-to-phone">← Edit Phone Number</button>
    </div>

    <!-- EMAIL LOGIN STEP (Initially Hidden) -->
    <div id="login-step-email" class="login-step" hidden>
        <div class="login-field">
            <label class="login-label">EMAIL ADDRESS</label>
            <input type="email" id="login-email" class="login-input" placeholder="example@email.com">
        </div>
        <div class="login-field" style="margin-top: 15px;">
            <label class="login-label">PASSWORD</label>
            <input type="password" id="login-password" class="login-input" placeholder="Enter password">
        </div>

        <div style="text-align: right; margin: 8px 0 15px;">
            <a href="#" class="login-forgot-link" style="font-size: 13px;">Forgot Password?</a>
        </div>

        <button type="button" class="login-submit" id="btn-email-login">Login</button>
        
        <div class="login-footer">
            <p style="margin-bottom: 12px;">By continuing, I confirm that I've read & understood the <a href="privacy.html">Privacy Policy</a> and <a href="terms.html">T&Cs</a></p>
            <button type="button" class="login-secondary-link" id="btn-back-to-phone-from-email">Continue with Phone (OTP)</button>
        </div>
    </div>
</div>
